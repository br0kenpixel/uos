[toolchain]
# Pinned to the window that bootloader 0.11.15 (BIOS + UEFI) builds in:
#  - >= nightly-2026-02-01: 0.11.15 needs -Zjson-target-spec support
#  - <  nightly-2026-07-06: rust-lang/rust#157151 dropped the `x86-softfloat`
#    rustc-abi alias that the BIOS stage .json target specs still use
#    (fixed on bootloader main, unreleased as of 2026-07)
#  - <  nightly-2026-07-10: `Step` trait change breaks x86_64 <0.15.5,
#    which the bootloader's locked build depends on
channel = "nightly-2026-07-04"
components = ["rustfmt", "clippy", "rust-src", "llvm-tools-preview"]
targets = ["x86_64-unknown-none"]
